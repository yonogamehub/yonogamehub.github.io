const status=document.getElementById("status");
const bar=document.getElementById("bar");

window.startImport=async function(){

let imported=0;
let skipped=0;

for(let i=0;i<games.length;i++){

const game=games[i];

status.innerHTML=`Checking ${game.name}...`;

const q=query(
collection(db,"games"),
where("name","==",game.name)
);

const snap=await getDocs(q);

if(snap.empty){

await addDoc(collection(db,"games"),game);

imported++;

}else{

skipped++;

}

const percent=Math.round(((i+1)/games.length)*100);

bar.style.width=percent+"%";

status.innerHTML=
`Imported : ${imported}
Skipped : ${skipped}
Progress : ${percent}%`;

}
